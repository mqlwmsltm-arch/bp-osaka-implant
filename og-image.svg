<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5016"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1071" cy="159" r="42" fill="#1a3a0a" opacity="0.10"/>
    <circle cx="903" cy="87" r="81" fill="#1a3a0a" opacity="0.10"/>
    <circle cx="535" cy="605" r="65" fill="#1a3a0a" opacity="0.15"/>
    <circle cx="738" cy="36" r="20" fill="#1a3a0a" opacity="0.14"/>
    <circle cx="990" cy="108" r="65" fill="#1a3a0a" opacity="0.17"/>
    <circle cx="-58" cy="153" r="39" fill="#1a3a0a" opacity="0.15"/>
    <rect x="1020" y="301" width="43" height="87" rx="8" fill="#2d5016" opacity="0.13" transform="rotate(30, 1013, 622)"/>
    <rect x="977" y="-32" width="45" height="66" rx="8" fill="#2d5016" opacity="0.11" transform="rotate(4, 182, 623)"/>
    <rect x="999" y="-33" width="94" height="53" rx="8" fill="#2d5016" opacity="0.10" transform="rotate(24, 37, 46)"/>
    <rect x="330" y="499" width="29" height="35" rx="8" fill="#2d5016" opacity="0.10" transform="rotate(43, 188, 526)"/>
    <rect x="940" y="289" width="70" height="65" rx="8" fill="#2d5016" opacity="0.15" transform="rotate(15, 1244, 193)"/>
    <rect x="1176" y="280" width="67" height="94" rx="8" fill="#2d5016" opacity="0.09" transform="rotate(4, 155, 615)"/>
    <rect x="602" y="666" width="84" height="46" rx="8" fill="#2d5016" opacity="0.11" transform="rotate(40, 1000, 347)"/>
    <rect x="188" y="165" width="62" height="59" rx="8" fill="#2d5016" opacity="0.13" transform="rotate(20, 1054, 282)"/>
    <polygon points="661,277 749,453 573,453" fill="#1a3a0a" opacity="0.10"/>
    <polygon points="1192,45 1245,151 1139,151" fill="#1a3a0a" opacity="0.05"/>
    <polygon points="547,347 623,499 471,499" fill="#1a3a0a" opacity="0.08"/>
    <polygon points="957,195 995,271 919,271" fill="#1a3a0a" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,568 C360,599 840,537 1200,568 L1200,630 L0,630Z" fill="#1a3a0a" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    공덕 셔츠룸 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    공덕 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#c8a96e" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#c8a96e" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
