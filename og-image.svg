<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="776" cy="-31" r="87" fill="#334155" opacity="0.15"/>
    <circle cx="704" cy="604" r="53" fill="#334155" opacity="0.14"/>
    <circle cx="-41" cy="191" r="45" fill="#334155" opacity="0.07"/>
    <circle cx="671" cy="141" r="99" fill="#334155" opacity="0.16"/>
    <circle cx="620" cy="199" r="27" fill="#334155" opacity="0.19"/>
    <circle cx="865" cy="726" r="77" fill="#334155" opacity="0.11"/>
    <rect x="220" y="-86" width="90" height="22" rx="8" fill="#0f172a" opacity="0.07" transform="rotate(38, 21, 442)"/>
    <rect x="278" y="330" width="69" height="70" rx="8" fill="#0f172a" opacity="0.11" transform="rotate(19, 364, 451)"/>
    <rect x="272" y="-95" width="65" height="77" rx="8" fill="#0f172a" opacity="0.03" transform="rotate(28, -65, 507)"/>
    <rect x="80" y="210" width="87" height="36" rx="8" fill="#0f172a" opacity="0.12" transform="rotate(15, 680, 372)"/>
    <rect x="944" y="576" width="95" height="82" rx="8" fill="#0f172a" opacity="0.14" transform="rotate(19, 1130, 303)"/>
    <rect x="838" y="669" width="69" height="82" rx="8" fill="#0f172a" opacity="0.06" transform="rotate(38, 212, 338)"/>
    <rect x="157" y="343" width="78" height="58" rx="8" fill="#0f172a" opacity="0.11" transform="rotate(7, 316, 326)"/>
    <rect x="905" y="54" width="44" height="51" rx="8" fill="#0f172a" opacity="0.04" transform="rotate(10, 736, 33)"/>
    <polygon points="551,474 619,610 483,610" fill="#334155" opacity="0.12"/>
    <polygon points="701,257 731,317 671,317" fill="#334155" opacity="0.10"/>
    <polygon points="927,-24 973,68 881,68" fill="#334155" opacity="0.11"/>
    <polygon points="662,616 753,798 571,798" fill="#334155" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,560 C360,595 840,525 1200,560 L1200,630 L0,630Z" fill="#334155" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    공덕 셔츠룸 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    공덕 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    공덕 공덕 셔츠룸 추천정보 — 셔츠룸
  </text>
</svg>